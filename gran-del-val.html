<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Gran Del Val · Sistema de Distribución y Consignación</title>
  <meta name="theme-color" content="#0A0A0A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --black: #0A0A0A;
      --black-2: #111111;
      --black-3: #17130E;
      --panel: #14110D;
      --panel-2: #1B160F;
      --gold: #C9973A;
      --gold-soft: #D9B46C;
      --gold-muted: #8F6A2B;
      --cream: #F5ECD7;
      --cream-soft: #D8C9A7;
      --muted: #A99A7B;
      --line: rgba(201, 151, 58, 0.26);
      --line-strong: rgba(201, 151, 58, 0.42);
      --green: #7E8E4E;
      --red: #B05B3C;
      --blue: #8CA5B7;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      --radius: 12px;
    }

    html { min-height: 100%; scroll-behavior: smooth; background: var(--black); }

    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 82% 8%, rgba(201, 151, 58, 0.13), transparent 28rem),
        radial-gradient(circle at 16% 0%, rgba(201, 151, 58, 0.10), transparent 26rem),
        linear-gradient(180deg, #0A0A0A 0%, #100D09 52%, #0A0A0A 100%);
      color: var(--cream);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    .app {
      min-height: 100svh;
      display: grid;
      grid-template-columns: 304px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100svh;
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding: 26px 22px;
      background:
        linear-gradient(180deg, rgba(201, 151, 58, 0.14), transparent 36%),
        linear-gradient(180deg, #111111 0%, #0A0A0A 100%);
      border-right: 1px solid var(--line);
    }

    .brand {
      display: grid;
      gap: 16px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand-logo {
      width: 112px;
      height: 112px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(201,151,58,0.2), transparent 62%),
        #050505;
      border: 1px solid var(--line-strong);
      box-shadow: 0 18px 48px rgba(0,0,0,0.36);
      padding: 10px;
    }

    .brand-logo img,
    .hero-logo img,
    .invoice-logo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .brand-kicker {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 0.73rem;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .brand-title {
      margin: 0;
      max-width: 230px;
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.24rem;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-meta {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
      font-weight: 600;
    }

    .nav { display: grid; gap: 8px; }

    .nav-button {
      width: 100%;
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: transparent;
      color: rgba(245,236,215,0.72);
      font-weight: 850;
      text-align: left;
      transition: 160ms ease;
    }

    .nav-button:hover,
    .nav-button.active {
      background: linear-gradient(135deg, rgba(201,151,58,0.18), rgba(201,151,58,0.07));
      color: var(--cream);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .nav-dot {
      width: 33px;
      height: 33px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(201,151,58,0.13);
      color: var(--gold-soft);
      border: 1px solid rgba(201,151,58,0.22);
      font-size: 0.74rem;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .sidebar-note {
      margin-top: auto;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: rgba(245,236,215,0.68);
      background: rgba(255,255,255,0.025);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .demo-mark {
      color: rgba(201,151,58,0.54);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .main {
      min-width: 0;
      padding: 30px clamp(22px, 4vw, 52px) 40px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      max-width: 980px;
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 4.1vw, 4.35rem);
      line-height: 0.96;
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 22px 80px rgba(201,151,58,0.11);
    }

    .page-subtitle {
      max-width: 860px;
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.58;
      font-weight: 650;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      flex: 0 0 auto;
    }

    .button {
      min-height: 43px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 15px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), #A97724);
      color: #0D0B08;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 16px 42px rgba(201,151,58,0.18);
    }

    .button.secondary {
      background: rgba(255,255,255,0.035);
      color: var(--cream);
      border: 1px solid var(--line-strong);
      box-shadow: none;
    }

    .hero-panel,
    .panel,
    .kpi-card,
    .store-card,
    .feature-card,
    .product-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018)),
        var(--panel);
      box-shadow: var(--shadow);
    }

    .hero-panel {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) 430px;
      gap: 28px;
      min-height: 470px;
      padding: clamp(28px, 4vw, 48px);
      margin-bottom: 22px;
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(201,151,58,0.08), transparent),
        radial-gradient(circle at 74% 10%, rgba(201,151,58,0.15), transparent 20rem);
    }

    .hero-copy,
    .hero-card { position: relative; z-index: 1; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 26px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 29px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid rgba(201,151,58,0.28);
      background: rgba(201,151,58,0.09);
      color: var(--gold-soft);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero-copy h2 {
      max-width: 640px;
      margin: 0;
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(3rem, 4.8vw, 5.15rem);
      line-height: 0.94;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 680px;
      margin: 24px 0 28px;
      color: var(--cream-soft);
      font-size: 1.05rem;
      line-height: 1.64;
      font-weight: 560;
    }

    .hero-card {
      display: grid;
      align-content: start;
      gap: 18px;
      min-height: 390px;
      padding: 26px;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(10,10,10,0.65), rgba(10,10,10,0.28)),
        radial-gradient(circle at 50% 0%, rgba(201,151,58,0.22), transparent 16rem);
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 1px rgba(255,255,255,0.08);
    }

    .hero-logo {
      width: 220px;
      height: 220px;
      display: grid;
      place-items: center;
      justify-self: center;
      padding: 14px;
      border-radius: 50%;
      background: #040404;
      border: 1px solid var(--line-strong);
      box-shadow: 0 28px 80px rgba(0,0,0,0.42);
    }

    .heritage-line {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .heritage-line div,
    .mini,
    .product-stat {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(201,151,58,0.17);
      background: rgba(255,255,255,0.035);
    }

    .heritage-line span,
    .mini span,
    .product-meta span,
    .product-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .heritage-line strong,
    .mini strong,
    .product-stat strong {
      display: block;
      margin-top: 5px;
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.02rem;
      line-height: 1.05;
    }

    .panel {
      padding: 20px;
      margin-bottom: 18px;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0;
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.42rem;
      line-height: 1.1;
      font-weight: 800;
    }

    .panel-subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.48;
      font-weight: 620;
    }

    .product-portfolio-grid,
    .inventory-product-grid,
    .kpi-grid,
    .feature-grid,
    .store-grid,
    .report-grid,
    .partner-grid {
      display: grid;
      gap: 14px;
    }

    .product-portfolio-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .inventory-product-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); margin-bottom: 16px; }
    .kpi-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); margin-bottom: 18px; }
    .feature-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 18px; }
    .store-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .report-grid { grid-template-columns: 1.08fr 0.92fr; }
    .partner-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .product-card {
      position: relative;
      overflow: hidden;
      padding: 16px;
      min-height: 240px;
    }

    .product-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(201,151,58,0.14), transparent 44%),
        radial-gradient(circle at 90% 8%, rgba(201,151,58,0.16), transparent 10rem);
    }

    .product-card > * { position: relative; z-index: 1; }

    .coffee-label {
      min-height: 92px;
      display: grid;
      align-content: center;
      gap: 6px;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(245,236,215,0.08), rgba(245,236,215,0.035)),
        #0E0C09;
      border: 1px solid rgba(201,151,58,0.23);
    }

    .coffee-label b {
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .coffee-label strong {
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.35rem;
      line-height: 1.02;
    }

    .product-card h3,
    .product-card h4,
    .feature-card h3,
    .store-card h3 {
      margin: 0;
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.13rem;
      line-height: 1.12;
      font-weight: 800;
    }

    .product-card h4 { font-size: 1rem; }

    .product-card.compact {
      min-height: 184px;
      display: grid;
      align-content: space-between;
    }

    .product-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 13px 0;
    }

    .product-meta strong {
      display: block;
      margin-top: 3px;
      color: var(--cream);
      font-weight: 900;
    }

    .kpi-card {
      min-height: 148px;
      padding: 18px;
      border-top: 3px solid var(--gold);
    }

    .kpi-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .kpi-value {
      margin: 14px 0 6px;
      color: var(--gold-soft);
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 3vw, 3.1rem);
      line-height: 0.9;
      font-weight: 900;
    }

    .kpi-help {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .feature-card,
    .store-card {
      padding: 18px;
    }

    .feature-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      border-radius: 50%;
      background: rgba(201,151,58,0.14);
      color: var(--gold);
      border: 1px solid rgba(201,151,58,0.24);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .feature-card p,
    .store-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.44;
      font-weight: 650;
    }

    .outlet-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .store-products {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .product-mini,
    .product-initial {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(201,151,58,0.26);
      background: rgba(201,151,58,0.12);
      color: var(--gold-soft);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1rem;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .product-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 210px;
    }

    .product-line strong {
      display: block;
      color: var(--cream);
      font-weight: 900;
    }

    .product-line span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 16px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.025);
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 210px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    select {
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      padding: 0 12px;
      background: #0E0C09;
      color: var(--cream);
      outline: none;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(0,0,0,0.18);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 13px 12px;
      background: #0F0D0A;
      color: var(--gold-soft);
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      padding: 13px 12px;
      border-bottom: 1px solid rgba(201,151,58,0.14);
      color: rgba(245,236,215,0.86);
      font-weight: 700;
      vertical-align: middle;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: rgba(201,151,58,0.05); }
    .num { font-variant-numeric: tabular-nums; }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(126,142,78,0.38);
      background: rgba(126,142,78,0.12);
      color: #BBD084;
      font-size: 0.73rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.low {
      border-color: rgba(201,151,58,0.40);
      background: rgba(201,151,58,0.12);
      color: var(--gold-soft);
    }

    .status.danger {
      border-color: rgba(176,91,60,0.42);
      background: rgba(176,91,60,0.14);
      color: #E49A81;
    }

    .status.info {
      border-color: rgba(140,165,183,0.38);
      background: rgba(140,165,183,0.12);
      color: #BDD4E2;
    }

    .alert-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .alert {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid rgba(201,151,58,0.17);
      background: rgba(255,255,255,0.03);
    }

    .alert strong { color: var(--cream); }
    .alert div { color: var(--muted); line-height: 1.42; font-weight: 700; }

    .invoice-paper {
      width: min(850px, 100%);
      margin: 0 auto;
      padding: 28px;
      border-radius: 14px;
      background: #FBF6EA;
      color: #19130C;
      box-shadow: var(--shadow);
    }

    .invoice-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 2px solid #C9973A;
    }

    .invoice-brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .invoice-logo {
      width: 72px;
      height: 72px;
      padding: 5px;
      border-radius: 50%;
      background: #090909;
    }

    .invoice-title {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: 2rem;
      line-height: 1;
    }

    .invoice-meta {
      display: grid;
      gap: 5px;
      text-align: right;
      color: #5C4D34;
      font-weight: 700;
    }

    .invoice-blocks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .invoice-box {
      padding: 14px;
      border: 1px solid rgba(201,151,58,0.36);
      border-radius: 10px;
      background: #FFFDF8;
      color: #423620;
      line-height: 1.5;
    }

    .invoice-box h4 {
      margin: 0 0 8px;
      color: #1A130C;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .invoice-paper .table-wrap { border-color: rgba(201,151,58,0.34); background: #FFFDF8; }
    .invoice-paper table { min-width: 640px; }
    .invoice-paper th { background: #19130C; color: #E4BF71; }
    .invoice-paper td { color: #21180F; border-bottom-color: rgba(201,151,58,0.20); }
    .invoice-paper .product-line strong { color: #21180F; }
    .invoice-paper .product-line span { color: #725D37; }

    .invoice-total {
      width: min(360px, 100%);
      margin: 18px 0 0 auto;
      display: grid;
      gap: 8px;
    }

    .total-line {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: #4E4025;
      font-weight: 750;
    }

    .total-line.grand {

                <div class="outlet-top">

            <div>
              <h3 class="panel-title">Facturas Gran Del Val</h3>
              <p class="panel-subtitle">Facturas por punto de venta con pagos recibidos, saldos abiertos y exportación PDF.</p>
            </div>
            <button class="button" data-invoice="${filteredRows()[0]?.invoice || rows[0].invoice}">Ver factura demo</button>
          </div>
          ${table(filteredRows(), [
            ["Número", row => `<strong>${row.invoice}</strong>`],
            ["Fecha", row => formatDate(row.deliveryDate)],
            ["Punto de venta", row => store(row).name],
            ["Producto", row => productLine(product(row))],
            ["Cantidad", row => row.sold],
            ["Total USD", row => money(totalOf(row))],
            ["Pagado", row => money(row.paid)],
            ["Pendiente", row => money(pendingOf(row))],
            ["Estado", row => statusPill(paymentStatus(row))],
            ["Exportar PDF", row => `<button class="button secondary" data-invoice="${row.invoice}">Ver / PDF</button>`]
          ])}
        </section>
      `;
    }

    function renderPayments() {
      return `
        ${renderFilters()}
        <section class="panel">
          <div class="panel-head">
            <div>
              <h3 class="panel-title">Pagos e historial</h3>
              <p class="panel-subtitle">Cobros recibidos, pendientes, parciales y fecha estimada de cobro por punto.</p>
            </div>
          </div>
          ${table(filteredRows(), [
            ["Punto", row => store(row).name],
            ["Factura", row => row.invoice],
            ["Producto", row => productLine(product(row))],
            ["Total", row => money(totalOf(row))],
            ["Recibido", row => money(row.paid)],
            ["Pendiente", row => money(pendingOf(row))],
            ["Fecha estimada", row => pendingOf(row) ? formatDate(row.restockDate) : "-"],
            ["Estado", row => statusPill(paymentStatus(row))]
          ])}
        </section>
      `;
    }

    function renderClosing() {
      const m = metrics();
      const best = bestRotation();
      const worst = worstRotation();
      const top = bestProduct();
      return `
        ${kpiGrid(m)}
        <section class="report-grid">
          <div class="panel">
            <h3 class="panel-title">Cierre comercial</h3>
            <p class="panel-subtitle">Producto más vendido, puntos con mayor y menor rotación, total facturado, cobrado y pendiente.</p>
            ${table([
              ["Producto más vendido", `${productById(top.productId).name} · ${top.sold} unidades`],
              ["Punto con mayor rotación", `${storeById(best.storeId).name} · ${best.rate}%`],
              ["Punto con menor rotación", `${storeById(worst.storeId).name} · ${worst.rate}%`],
              ["Total facturado", money(m.total)],
              ["Total cobrado", money(m.paid)],
              ["Total pendiente", money(m.pending)]
            ], [
              ["Indicador", row => row[0]],
              ["Valor", row => `<strong>${row[1]}</strong>`]
            ])}
          </div>
          <div class="panel">
            <h3 class="panel-title">Red de distribución activa</h3>
            <p class="panel-subtitle">Puntos nacionales configurados para Gran Del Val.</p>
            <div class="partner-grid">
              ${stores.map(place => `<span class="chip">${place.name}</span>`).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderFilters() {
      return `
        <section class="filters">
          <div class="field">
            <label>Punto de venta</label>
            <select data-filter="store">
              <option value="all">Todos</option>
              ${stores.map(item => `<option value="${item.id}" ${filters.store === item.id ? "selected" : ""}>${item.name}</option>`).join("")}
            </select>
          </div>
          <div class="field">
            <label>Producto</label>
            <select data-filter="product">
              <option value="all">Todos</option>
              ${products.map(item => `<option value="${item.id}" ${filters.product === item.id ? "selected" : ""}>${item.name}</option>`).join("")}
            </select>
          </div>
          <div class="field">
            <label>Estado</label>
            <select data-filter="status">
              <option value="all">Todos</option>
              ${["En orden", "Stock bajo", "Reposición necesaria", "Próximo a vencer"].map(status => `<option value="${status}" ${filters.status === status ? "selected" : ""}>${status}</option>`).join("")}
            </select>
          </div>
        </section>
      `;
    }

    function table(data, columns) {
      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${columns.map(([label]) => `<th>${label}</th>`).join("")}</tr></thead>
            <tbody>
              ${data.map(row => `<tr>${columns.map(([label, render]) => `<td data-label="${label}">${render(row)}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function showInvoice(invoiceNumber) {
      const row = rows.find(item => item.invoice === invoiceNumber) || rows[0];
      modalRoot.innerHTML = `
        <div class="modal-backdrop" data-close-modal>
          <section class="modal" role="dialog" aria-modal="true">
            ${invoiceDocument(row)}
            <div class="modal-footer">
              <button class="button secondary" data-close-modal>Cerrar</button>
              <button class="button" data-export-pdf="${row.invoice}">Exportar PDF</button>
            </div>
          </section>
        </div>
      `;
    }

    function invoiceDocument(row) {
      return `
        <article class="invoice-paper">
          <header class="invoice-head">
            <div class="invoice-brand">
              <div class="invoice-logo"><img src="${logoUrl}" alt="Gran Del Val"></div>
              <div>
                <h3 class="invoice-title">Factura</h3>
                <p class="panel-subtitle">Gran Del Val · Specialty Coffee · Boquete, Panamá</p>
              </div>
            </div>
            <div class="invoice-meta">
              <strong>${row.invoice}</strong>
              <span>Fecha: ${formatDate(row.deliveryDate)}</span>
              <span>Términos: ${store(row).terms}</span>
            </div>
          </header>
          <section class="invoice-blocks">
            <div class="invoice-box">
              <h4>Facturar a</h4>
              <strong>${store(row).name}</strong><br>
              ${store(row).contact}<br>
              ${store(row).city}
            </div>
            <div class="invoice-box">
              <h4>Gran Del Val</h4>
              Specialty Coffee · ESTD 1914<br>
              Boquete, Panamá<br>
              Distribución nacional y consignación
            </div>
          </section>
          ${table([row], [
            ["Descripción", item => productLine(product(item))],
            ["Presentación", item => product(item).size],
            ["Lote", item => product(item).batch],
            ["Cantidad", item => item.sold],
            ["Precio unit.", item => money(product(item).price)],
            ["Importe", item => money(totalOf(item))]
          ])}
          <section class="invoice-total">
            <div class="total-line"><span>Subtotal</span><strong>${money(totalOf(row))}</strong></div>
            <div class="total-line"><span>Pago recibido</span><strong>${money(row.paid)}</strong></div>
            <div class="total-line grand"><span>Saldo pendiente</span><strong>${money(pendingOf(row))}</strong></div>
          </section>
        </article>
      `;
    }

    async function exportPdf(invoiceNumber) {
      const row = rows.find(item => item.invoice === invoiceNumber) || rows[0];
      const holder = document.createElement("div");
      holder.innerHTML = invoiceDocument(row);
      document.body.appendChild(holder);
      const element = holder.querySelector(".invoice-paper");
      const filename = `Factura-${row.invoice}-${store(row).name.replace(/[^a-z0-9]+/gi, "-")}.pdf`;
      try {
        if (typeof window.html2pdf === "function") {
          await window.html2pdf().set({
            margin: 0.18,
            filename,
            image: { type: "jpeg", quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: "#FBF6EA", useCORS: true },
            jsPDF: { unit: "in", format: "letter", orientation: "portrait", compress: true },
            pagebreak: { mode: ["avoid-all", "css"] }
          }).from(element).save();
        } else {
          printRoot.innerHTML = invoiceDocument(row);
          window.print();
        }
      } finally {
        holder.remove();
      }
    }

    function handleClick(event) {
      const tabTarget = event.target.closest("[data-tab]");
      if (tabTarget) {
        activeTab = tabTarget.dataset.tab;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }
      const invoiceTarget = event.target.closest("[data-invoice]");
      if (invoiceTarget) {
        showInvoice(invoiceTarget.dataset.invoice);
        return;
      }
      const exportTarget = event.target.closest("[data-export-pdf]");
      if (exportTarget) {
        exportPdf(exportTarget.dataset.exportPdf);
        return;
      }
      const closeTarget = event.target.closest("[data-close-modal]");
      if (closeTarget && (event.target === closeTarget || closeTarget.tagName === "BUTTON")) {
        modalRoot.innerHTML = "";
      }
    }

    function handleChange(event) {
      const filter = event.target.dataset.filter;
      if (!filter) return;
      filters[filter] = event.target.value;
      render();
    }

    function filteredRows() {
      return rows.filter(row =>
        (filters.store === "all" || row.storeId === filters.store) &&
        (filters.product === "all" || row.productId === filters.product) &&
        (filters.status === "all" || visualStatus(row) === filters.status)
      );
    }

    function metrics() {
      const delivered = sum(rows, "delivered");
      const sold = sum(rows, "sold");
      const stock = rows.reduce((total, row) => total + stockOf(row), 0);
      const paid = rows.reduce((total, row) => total + Number(row.paid || 0), 0);
      const total = rows.reduce((total, row) => total + totalOf(row), 0);
      const pending = round(Math.max(0, total - paid));
      const pendingInvoices = rows.filter(row => pendingOf(row) > 0).length;
      const restock = rows.filter(row => ["Reposición necesaria", "Stock bajo"].includes(visualStatus(row))).length;
      return { delivered, sold, stock, paid, total, pending, pendingInvoices, restock };
    }

    function bestRotation() {
      return stores.map(place => {
        const related = rows.filter(row => row.storeId === place.id);
        const delivered = sum(related, "delivered");
        const sold = sum(related, "sold");
        return { storeId: place.id, rate: delivered ? Math.round((sold / delivered) * 100) : 0 };
      }).sort((a, b) => b.rate - a.rate)[0];
    }

    function worstRotation() {
      return stores.map(place => {
        const related = rows.filter(row => row.storeId === place.id);
        const delivered = sum(related, "delivered");
        const sold = sum(related, "sold");
        return { storeId: place.id, rate: delivered ? Math.round((sold / delivered) * 100) : 0 };
      }).sort((a, b) => a.rate - b.rate)[0];
    }

    function bestProduct() {
      return products.map(item => {
        const sold = rows.filter(row => row.productId === item.id).reduce((total, row) => total + Number(row.sold || 0), 0);
        return { productId: item.id, sold };
      }).sort((a, b) => b.sold - a.sold)[0];
    }

    function storeStatus(related) {
      if (related.some(row => visualStatus(row) === "Reposición necesaria")) return "Reposición necesaria";
      if (related.some(row => visualStatus(row) === "Stock bajo")) return "Stock bajo";
      if (related.some(row => visualStatus(row) === "Próximo a vencer")) return "Próximo a vencer";
      if (related.some(row => paymentStatus(row) === "Pendiente")) return "Pago pendiente";
      return "En orden";
    }

    function visualStatus(row) {
      const stock = stockOf(row);
      const days = daysUntil(product(row).bestBefore);
      if (stock === 0 || row.status === "Reposición necesaria") return "Reposición necesaria";
      if (stock <= 5 || row.status === "Stock bajo") return "Stock bajo";
      if (days <= 45) return "Próximo a vencer";
      return "En orden";
    }

    function productStatus(item) {
      const related = productRows(item);
      if (related.some(row => visualStatus(row) === "Reposición necesaria")) return "Reposición necesaria";
      if (related.some(row => visualStatus(row) === "Stock bajo")) return "Stock bajo";
      if (daysUntil(item.bestBefore) <= 45) return "Próximo a vencer";
      return "En orden";
    }

    function statusPill(status) {
      const danger = ["Reposición necesaria", "Pendiente"].includes(status);
      const low = ["Stock bajo", "Parcial", "Próximo a vencer", "Pago pendiente"].includes(status);
      const info = ["Pagado"].includes(status);
      return `<span class="status ${danger ? "danger" : low ? "low" : info ? "info" : ""}">${status}</span>`;
    }

    function store(row) { return stores.find(item => item.id === row.storeId) || stores[0]; }
    function storeById(id) { return stores.find(item => item.id === id) || stores[0]; }
    function product(row) { return products.find(item => item.id === row.productId) || products[0]; }
    function productById(id) { return products.find(item => item.id === id) || products[0]; }
    function productRows(item) { return rows.filter(row => row.productId === item.id); }
    function productSummary(item) {
      const related = productRows(item);
      return {
        delivered: sum(related, "delivered"),
        sold: sum(related, "sold"),
        stock: related.reduce((total, row) => total + stockOf(row), 0)
      };
    }
    function productLine(item) {
      return `
        <div class="product-line">
          <span class="product-initial">${initials(item)}</span>
          <div><strong>${item.name}</strong><span>${item.size} · ${item.farm}</span></div>
        </div>
      `;
    }
    function initials(item) {
      if (item.id === "house") return "HB";
      if (item.id === "verde") return "CV";
      return item.name.replace("Café ", "").split(" ").map(part => part[0]).join("").slice(0, 2).toUpperCase();
    }
    function stockOf(row) { return Math.max(0, Number(row.delivered || 0) - Number(row.sold || 0) - Number(row.returned || 0)); }
    function totalOf(row) { return round(Number(row.sold || 0) * Number(product(row).price || 0)); }
    function pendingOf(row) { return round(Math.max(0, totalOf(row) - Number(row.paid || 0))); }
    function paymentStatus(row) { return pendingOf(row) <= 0 ? "Pagado" : Number(row.paid || 0) > 0 ? "Parcial" : "Pendiente"; }
    function sum(list, key) { return list.reduce((total, row) => total + Number(row[key] || 0), 0); }
    function round(value) { return Math.round(value * 100) / 100; }
    function daysUntil(value) {
      const date = new Date(`${value}T00:00:00`);
      return Math.ceil((date - demoToday) / 86400000);
    }
    function money(value) { return `USD ${round(value).toFixed(2)}`; }
    function num(value) { return `<span class="num">${value}</span>`; }
    function formatDate(value) {
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return "-";
      return `${String(date.getDate()).padStart(2, "0")}/${String(date.getMonth() + 1).padStart(2, "0")}/${date.getFullYear()}`;
    }
  </script>
</body>
</html>
